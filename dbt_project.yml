name: 'kkbox_dbt'
version: '1.0.0'
config-version: 2
profile: 'kkbox_dbt'
model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"
models:
  kkbox_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

data_tests:
  kkbox_dbt:
    +store_failures: true
    +schema: test_failures