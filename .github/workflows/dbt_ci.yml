name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
      KEYFILE_PATH: ${{ github.workspace }}/bq-key.json
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.* dbt-bigquery==1.11.*

      - name: Write BigQuery key from secret
        run: echo '${{ secrets.BIGQUERY_KEYFILE }}' > "${{ github.workspace }}/bq-key.json"

      - name: Install dbt packages
        run: dbt deps --profiles-dir ci_profiles

      - name: Build and test the whole project
        run: dbt build --profiles-dir ci_profiles