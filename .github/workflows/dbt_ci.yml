name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: kkbox_dbt # our dbt project is nested here

    env:
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
      KEYFILE_PATH: ${{ github.workspace }}/bq-key.json

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-bigquery==1.11.*

      - name: Write BigQuery key from secret
        run: echo '${{ secrets.BIGQUERY_KEYFILE }}' > "${{ github.workspace }}/bq-key.json"

      - name: Install dbt packages
        run: dbt deps --profiles-dir ci_profiles

      - name: Build and test the whole project
        run: dbt build --profiles-dir ci_profiles